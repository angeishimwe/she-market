<!DOCTYPE html>
<html>
<head>
  <title>Seller Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h2>Seller Dashboard</h2>

  <input id="name" placeholder="Product Name"><br><br>
  <input id="price" type="number" placeholder="Price"><br><br>
  <input id="stock" type="number" placeholder="Stock"><br><br>
  <input type="file" id="photo"><br><br>

  <button onclick="addProduct()">Add Product</button>

  <h3>My Products</h3>
  <div id="myProducts"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js"></script>
  <script src="js/seller.js"></script>
</body>
</html>
